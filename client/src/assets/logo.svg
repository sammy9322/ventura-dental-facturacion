<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" fill="none">
  <!-- Dental Icon - Smile Arc -->
  <path d="M15 35 Q25 20 40 35" stroke="#00BCD4" stroke-width="3" stroke-linecap="round" fill="none"/>
  <circle cx="40" cy="35" r="3" fill="#613192"/>
  <!-- Star -->
  <path d="M12 28 L14 33 L19 33 L15 36 L17 41 L12 38 L7 41 L9 36 L5 33 L10 33 Z" fill="#613192" opacity="0.8"/>

  <!-- VENTURA - Purple -->
  <text x="52" y="38" font-family="Arial, sans-serif" font-weight="700" font-size="22" fill="#613192" letter-spacing="1">
    VENTURA
  </text>

  <!-- DENTAL - Turquoise -->
  <text x="52" y="58" font-family="Arial, sans-serif" font-weight="600" font-size="14" fill="#00BCD4" letter-spacing="3">
    DENTAL
  </text>

  <!-- Decorative line -->
  <rect x="52" y="48" width="130" height="2" rx="1" fill="url(#grad)" opacity="0.3"/>

  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#613192"/>
      <stop offset="100%" stop-color="#00BCD4"/>
    </linearGradient>
  </defs>
</svg>