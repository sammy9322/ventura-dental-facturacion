# Plantilla YAML recomendada para la serialización de Work Items.
# Las claves deben coincidir con la convención JSON adoptada.

title: "[Ingresar Título]"
type: "[epic | feature | user_story | bug | task]"
status: "[new | active | closed | resolved | removed]"
localId: "[E-XX | F-XX | US-XX | B-XX | T-XX]"
adoId:
parentId:
storyPoints: 0 # (Solo US o Bugs)
completedWork: 0 # (Solo Tasks)
remainingWork: 0 # (Solo Tasks)
areaPath: "<PROYECTO>\\<AREA_PATH>"
iterationPath: "<PROYECTO>\\<ITERATION_PATH>"
assignedTo: ""
priority: 2 # (Solo Bugs, 1-4)
severity: 3 # (Solo Bugs, 1-4)
tags:
  - "label1"
  - "label2"
